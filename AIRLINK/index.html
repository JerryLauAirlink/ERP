<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIRLINK ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="/world-map-data.js" onerror="this.onerror=null;this.src='../world-map-data.js'"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html, body { overflow-x: auto; height: 100%; }
      .erp-app-shell { min-width: 0; width: 100%; min-height: 100dvh; }
      .erp-list-scroll {
        overflow: auto;
        max-height: calc(100dvh - 11rem);
        -webkit-overflow-scrolling: touch;
      }
      .erp-list-scroll--toolbar { max-height: calc(100dvh - 15.5rem); }
      .erp-list-scroll--ongoing { max-height: calc(100dvh - 10rem); }
      .erp-list-scroll--dash { max-height: 20rem; }
      .erp-list-scroll--settings { max-height: 28rem; }
      .erp-list-scroll table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
      }
      .erp-list-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 4;
        background-color: #f8fafc;
        color: #64748b;
        box-shadow: inset 0 -1px 0 #e2e8f0;
      }
      .erp-list-scroll--ongoing thead th {
        background-color: #dae3f3;
        color: #1e293b;
        box-shadow: inset 0 -1px 0 #cbd5e1;
      }
      .erp-list-scroll tbody td { background-color: #fff; }
      .erp-list-scroll--compact table { font-size: 0.8125rem; }
      .erp-list-scroll--compact th,
      .erp-list-scroll--compact td { padding: 0.3rem 0.5rem !important; line-height: 1.25; vertical-align: middle; }
      .erp-list-scroll--compact tbody tr { height: 1.75rem; }
      .erp-list-scroll--compact .erp-cell-truncate { max-width: 9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .erp-list-scroll--compact { max-height: calc(100dvh - 9.5rem); }
      .erp-list-scroll--compact.erp-list-scroll--toolbar { max-height: calc(100dvh - 13.5rem); }
      .erp-list-scroll tbody tr[class*="bg-green-50"] td { background-color: #f0fdf4; }
      @media (max-width: 1536px) {
        .erp-list-scroll { max-height: calc(100dvh - 10rem); }
        .erp-list-scroll--toolbar { max-height: calc(100dvh - 14.5rem); }
      }
      @media (max-width: 1280px) {
        .erp-list-scroll table { font-size: 0.8125rem; }
        .erp-list-scroll th, .erp-list-scroll td { padding: 0.5rem 0.625rem; }
      }
      .erp-login-shell {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: linear-gradient(180deg, #eef0f3 0%, #f7f8fa 55%, #ffffff 100%);
      }
      .erp-login-card {
        width: 100%;
        max-width: 400px;
        padding: 0 0.25rem;
      }
      .erp-login-brand {
        margin-bottom: 2rem;
        text-align: center;
      }
      .erp-login-brand img {
        width: 100%;
        max-width: 320px;
        height: auto;
        display: inline-block;
      }
      .erp-login-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .erp-login-field {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        height: 3rem;
        padding: 0 1rem;
        border: 1px solid #d8dee6;
        border-radius: 0.65rem;
        background: #fff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      .erp-login-field:focus-within {
        border-color: #94a3b8;
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.15);
      }
      .erp-login-field input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font-size: 0.95rem;
        color: #334155;
      }
      .erp-login-field input::placeholder { color: #94a3b8; }
      .erp-login-remember {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.82rem;
        color: #94a3b8;
        padding-left: 0.15rem;
      }
      .erp-login-btn {
        width: 100%;
        height: 3.25rem;
        margin-top: 0.35rem;
        border: none;
        border-radius: 9999px;
        font-size: 1.05rem;
        font-weight: 600;
        color: #475569;
        background: linear-gradient(180deg, #f8fafc 0%, #e8edf3 100%);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06), inset 0 1px 0 rgba(255,255,255,0.9);
        cursor: pointer;
      }
      .erp-login-btn:hover:not(:disabled) {
        background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
      }
      .erp-login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .erp-login-error {
        font-size: 0.82rem;
        color: #dc2626;
        text-align: center;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 0.5rem;
        padding: 0.45rem 0.6rem;
      }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="app"><p class="p-6 text-slate-500 text-sm">Loading ERP System...</p></div>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("app");
        if (el) el.innerHTML = '<div style="padding:24px;color:#b91c1c;font-family:sans-serif"><strong>Load error:</strong><br>' + (e.message || "Unknown error") + '</div>';
      });
    </script>
    <script>
      (async function bootErpApp() {
        var el = document.getElementById("app");
        var BUILD = "airlink-2026-07-09c";
        try {
          if (typeof Babel === "undefined") throw new Error("Babel not loaded");
          var url = "/AIRLINK/erp-app.jsx?v=" + BUILD;
          if (location.protocol === "file:") url = "erp-app.jsx?v=" + BUILD;
          var res = await fetch(url);
          if (!res.ok) throw new Error("Failed to load " + url + " (HTTP " + res.status + ")");
          var code = await res.text();
          var compiled = Babel.transform(code, {
            presets: [["react", { runtime: "classic" }]],
            sourceType: "script",
            filename: "erp-app.jsx"
          }).code;
          if (/^\s*import\s/m.test(compiled)) throw new Error("Babel compile produced import statements — check react runtime setting");
          var s = document.createElement("script");
          s.textContent = compiled;
          document.body.appendChild(s);
        } catch (err) {
          console.error("ERP boot failed", err);
          if (el) el.innerHTML = '<div style="padding:24px;color:#b91c1c;font-family:sans-serif;max-width:36rem"><strong>ERP load error</strong><p style="margin-top:8px">' + (err.message || err) + '</p><p style="margin-top:12px;font-size:13px;color:#64748b">Press Ctrl+Shift+R to hard refresh. If on a second PC, ensure GitHub deploy includes AIRLINK/erp-app.jsx.</p></div>';
        }
      })();
    </script>
</body>
</html>
