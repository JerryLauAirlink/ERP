        const out = emptyPermissions();
        ERP_MODULES.forEach((m) => {
          if (perms && perms[m]) PERM_KEYS.forEach((k) => { out[m][k] = !!perms[m][k]; });
        });
        return out;
      }

      function downloadWorkbook(wb, filename) {
        XLSX.writeFile(wb, filename);
      }

      function buildWorkbook(schema, dataRows, includeHints) {
        const headerRow = schema.columns.map((c) => c.header);
        const hintRow = schema.columns.map((c) => c.hint || "");
        const body = dataRows.map((r) => schema.columns.map((c) => (r[c.field] != null ? r[c.field] : "")));
        const aoa = includeHints ? [headerRow, hintRow, ...body] : [headerRow, ...body];
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, schema.sheetName);
        return wb;
      }

      function parseExcelRows(arrayBuffer, schema) {
        const wb = XLSX.read(arrayBuffer, { type: "array" });
        const sheet = wb.Sheets[schema.sheetName] || wb.Sheets[wb.SheetNames[0]];
        if (!sheet) return { rows: [], errors: ["No worksheet found"] };
        const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if (!raw.length) return { rows: [], errors: ["Empty file"] };
        const headers = raw[0].map((h) => String(h).trim());
        const fieldByCol = {};
        schema.columns.forEach((col) => {
          const idx = headers.findIndex((h) => h.toLowerCase() === col.header.toLowerCase());
          if (idx >= 0) fieldByCol[idx] = col.field;
        });
        const missing = schema.columns.filter((c) => c.required && !Object.values(fieldByCol).includes(c.field));
        if (missing.length) return { rows: [], errors: ["Missing columns: " + missing.map((c) => c.header).join(", ")] };
        const rows = [];
        for (let i = 1; i < raw.length; i++) {
          const line = raw[i];
          if (!line || line.every((cell) => String(cell).trim() === "")) continue;
          const first = String(line[0] || "").trim();
          if (first.startsWith("(") || first.toLowerCase().includes("required")) continue;
          const rec = {};
          Object.entries(fieldByCol).forEach(([idx, field]) => {
            rec[field] = String(line[Number(idx)] != null ? line[Number(idx)] : "").trim();
          });
          rows.push(rec);
        }
        return { rows, errors: [] };
      }

          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).format(date);
      }

      function paymentStatusLabel(status, t) {
        if (status === "Paid") return t("paid");
        if (status === "Overdue") return t("overdue");
        return t("awaitingPayment");
      }

      function paymentStatusClass(status) {
        if (status === "Paid") return "text-green-700 bg-green-100";
        if (status === "Overdue") return "text-red-700 bg-red-100";
        return "text-amber-700 bg-amber-100";
      }

      function isJobCompleted(status) {
        return status === "Completed" || status === "Complete";
      }

      function jobStatusClass(status) {
        if (isJobCompleted(status)) return "text-green-800 bg-green-100 font-semibold ring-1 ring-green-300";
        if (status === "In Progress") return "text-blue-700 bg-blue-100";
        if (status === "On Hold") return "text-slate-600 bg-slate-100";
        return "text-amber-700 bg-amber-100";
      }

      function isApPaid(bill) {
        return !!(bill && bill.pay_date);
      }

      function apPaymentLabel(bill, t) {

        if (!dueDate) return 0;
        const now = new Date();

        return diff > 0 ? diff : 0;

        if (!startDate || !endDate) return 0;
        const start = new Date(startDate + "T00:00:00");

        const diff = Math.floor((end - start) / (1000 * 60 * 60 * 24));
        return diff > 0 ? diff : 0;
      }

        if (!amount) return 0;

            logAudit(module, "export", schema.sheetName, `Exported ${mode} (${rows.length} rows)`);
          }
        }

        function buildImportPreview(module, parsedRows) {
          const schema = EXCEL_SCHEMAS[module];
          const preview = [];
          const seen = new Set();
          parsedRows.forEach((row, idx) => {
            const lineNo = idx + 1;
            const key = String(row[schema.keyField] || "").trim();
            const errors = [];
            schema.columns.filter((c) => c.required).forEach((c) => {
              if (!String(row[c.field] || "").trim()) errors.push(c.header + " required");
            });
            if (!key) errors.push(schema.keyField + " required");
            if (key && seen.has(key.toLowerCase())) errors.push("Duplicate key in file: " + key);
            if (key) seen.add(key.toLowerCase());

            if (module === "job") {
              const company = String(row.company || "").trim();
              const client = clients.find((c) => c.company.toLowerCase() === company.toLowerCase());
              if (!client) errors.push("Client not found: " + (company || "(empty)"));
              const jt = String(row.job_type || "").trim();
              if (jt && !JOB_TYPES.includes(jt)) errors.push("Invalid Type: " + jt);
              if (!String(row.status || "").trim()) row.status = "Open";
            }

            if (errors.length) {
              preview.push({ lineNo, action: "error", key, data: row, errors });
              return;
            }

            if (module === "clients") {
              const existing = clients.find((c) => c.customer_no.toLowerCase() === key.toLowerCase());
              preview.push({ lineNo, action: existing ? "update" : "create", key, data: row, errors: [] });
            } else if (module === "job") {
              const existing = jobs.find((j) => j.job_no.toLowerCase() === key.toLowerCase());
              preview.push({ lineNo, action: existing ? "update" : "create", key, data: row, errors: [] });
            }
          });
          return preview;
        }

        function handleImportFile(module, file) {
          if (!guardPermission(module, "import")) return;
          if (!file) return;
          if (typeof XLSX === "undefined") { alert("Excel library not loaded"); return; }
          const schema = EXCEL_SCHEMAS[module];
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const { rows, errors } = parseExcelRows(e.target.result, schema);
              if (errors.length) { alert(errors.join("\n")); return; }
              if (!rows.length) { alert(t("importNoRows")); return; }
              const preview = buildImportPreview(module, rows);
              setImportPreview({ module, preview, fileName: file.name });
            } catch (err) {
              alert(t("importFileError") + " " + (err.message || ""));
            }
          };
          reader.readAsArrayBuffer(file);
        }

        function applyImportPreview() {
          if (!importPreview) return;
          const { module, preview, fileName } = importPreview;
          const valid = preview.filter((p) => p.action !== "error");
          if (!valid.length) { alert(t("importNoRows")); return; }

          let created = 0;
          let updated = 0;
          if (module === "clients") {
            let next = [...clients];
            valid.forEach((p) => {
              const payload = { ...p.data };
              const existing = next.find((c) => c.customer_no.toLowerCase() === p.key.toLowerCase());
              if (existing) {
                const oldCompany = existing.company;
                Object.assign(existing, payload);
                if (oldCompany !== payload.company) syncCompanyName(oldCompany, payload.company);
                updated++;
              } else {
                next = [{ id: Date.now() + Math.floor(Math.random() * 10000), region: regionForNewRecord(), ...payload }, ...next];
                created++;
              }
            });
            setClients(next);
          } else if (module === "job") {
            let next = [...jobs];
            valid.forEach((p) => {
              const client = clients.find((c) => c.company.toLowerCase() === String(p.data.company || "").toLowerCase());
              const payload = {
                job_no: p.data.job_no,
                company: client ? client.company : p.data.company,
                client_id: client ? client.id : null,
                job_type: p.data.job_type || "Project",
                customer_po: p.data.customer_po || "",
                status: p.data.status || "Open",
                start_date: p.data.start_date || "",
                description: p.data.description || ""
              };
              const existing = next.find((j) => j.job_no.toLowerCase() === p.key.toLowerCase());
              if (existing) {
                const oldNo = existing.job_no;
                Object.assign(existing, payload);
                if (oldNo !== payload.job_no) {
                  setArInvoices((prev) => prev.map((r) => (r.job_no === oldNo ? { ...r, job_no: payload.job_no, job_id: existing.id } : r)));
                }
                syncArWithJobStatus(existing.id, payload.job_no, payload.status);
                updated++;
              } else {
                const newId = Date.now() + Math.floor(Math.random() * 10000);
                next = [{ id: newId, region: regionForNewRecord(), ...payload }, ...next];
                created++;
              }
            });
            setJobs(next);
          }

          logAudit(module, "import", fileName, `Imported ${created} new, ${updated} updated, ${preview.length - valid.length} errors`);
          setImportPreview(null);
          alert(t("importSummary") + ": " + created + " " + t("importRowCreate") + ", " + updated + " " + t("importRowUpdate"));

                  <div><p className="text-slate-500">{t("payeeType")}</p><p>{b.payee_type === "SI" ? t("payeeSi") : t("payeeVendor")}</p></div>
                  <div><p className="text-slate-500">Company</p><p>{b.company_name}</p></div>
                  <div><p className="text-slate-500">Amount</p><p>{money(b.amount)} {b.currency}</p></div>
                  <div><p className="text-slate-500">Amount in SGD</p><p>{money(convertCurrency(b.amount, b.currency, "SGD"))}</p></div>
                  <div><p className="text-slate-500">Due Date</p><p>{b.due_date}</p></div>
                  <div><p className="text-slate-500">{t("paymentStatus")}</p><p><span className={"px-2 py-0.5 rounded text-xs " + apPaymentClass(b)}>{apPaymentLabel(b, t)}</span></p></div>
                  <div><p className="text-slate-500">Pay Date</p><p>{b.pay_date || "-"}</p></div>
                  <div><p className="text-slate-500">Bank</p><p>{b.bank}</p></div>
                  <div><p className="text-slate-500">SWIFT</p><p>{b.swift_code}</p></div>
                </div>
                {!isApPaid(b) && (
                  <div className="mt-4">
                    <button type="button" onClick={() => { markApPaid(b.id); setDetailPanel(null); }} className="px-4 py-2 rounded-lg bg-green-600 text-white text-sm hover:bg-green-700">{t("markApPaid")}</button>
                  </div>
                )}
              </Modal>
            );
          }
          return null;
        }

        function renderJobRows(list) {
          return list.map((j) => (
            <tr key={j.id} className={"hover:bg-blue-50/50 cursor-pointer " + (isJobCompleted(j.status) ? "bg-green-50/70 " : "") + rowHighlightClass(j.id)} onClick={() => setDetailPanel({ type: "job", id: j.id })}>
              <td className="p-3 font-medium">{j.job_no}</td>
              <td className="p-3"><span className="px-2 py-0.5 rounded bg-blue-100 text-blue-800 text-xs">{j.company}</span></td>
              <td className="p-3">{j.job_type}</td>
              <td className="p-3">{j.customer_po || "-"}</td>
              <td className="p-3"><span className={"px-2 py-0.5 rounded text-xs " + jobStatusClass(j.status)}>{j.status}</span></td>
              <td className="p-3">{j.start_date || "-"}</td>
              <td className="p-3">{getArByJob(j.job_no).length}</td>
              <td className="p-3">{getApByJob(j.job_no).length}</td>
              <td className="p-3">
                <ActionButtons viewLabel={t("view")} editLabel={t("edit")} deleteLabel={t("delete")} canEdit={can("job", "edit")} canDelete={can("job", "delete")} onDelete={() => deleteJob(j.id)} onView={() => setDetailPanel({ type: "job", id: j.id })} onEdit={() => setJobModal({ mode: "edit", id: j.id, data: { ...j, client_id: String(j.client_id) } })}
                  extra={isJobCompleted(j.status) && can("ar", "add") ? <button type="button" onClick={(e) => { e.stopPropagation(); openArFromJob(j); }} className="px-2 py-1 text-xs rounded bg-green-600 text-white hover:bg-green-700">{t("issueInvoiceToClient")}</button> : null}
                />
              </td>
            </tr>
          ));
        }

        function renderArRows(list) {
          return list.map((r) => {
            const linkedJob = getJobForAr(r);
            const jobStatus = linkedJob ? linkedJob.status : "-";
            return (
            <tr key={r.id} className={"hover:bg-blue-50/50 cursor-pointer " + rowHighlightClass(r.id)} onClick={() => setDetailPanel({ type: "ar", id: r.id })}>
              <td className="p-3">{r.job_no}</td><td className="p-3">{r.customer}</td><td className="p-3">{r.customer_po || "-"}</td>
              <td className="p-3"><span className={"px-2 py-0.5 rounded text-xs " + (linkedJob ? jobStatusClass(linkedJob.status) : "bg-slate-100")}>{jobStatus}</span></td>
              <td className="p-3">{r.invoice_no}</td><td className="p-3">{r.invoice_currency}</td><td className="p-3 text-right">{money(r.invoice_amt)}</td>
              <td className="p-3 text-right font-medium">{money(convertCurrency(r.invoice_amt, r.invoice_currency, "SGD"))}</td>
              <td className="p-3">{r.invoice_date}</td><td className="p-3">{r.due_date}</td>
              <td className="p-3 text-right">{r.payment_status === "Paid" ? 0 : calcOverdueDays(r.due_date)}</td><td className="p-3 text-right">{calcDaysBetween(r.invoice_date, r.due_date)}</td>
              <td className="p-3">{r.payment_received_date || "-"}</td>
              <td className="p-3"><span className={"px-2 py-0.5 rounded text-xs " + paymentStatusClass(r.payment_status)}>{paymentStatusLabel(r.payment_status, t)}</span></td>
              <td className="p-3">
                <ActionButtons viewLabel={t("view")} editLabel={t("edit")} deleteLabel={t("delete")} canEdit={can("ar", "edit")} canDelete={can("ar", "delete")} onDelete={() => deleteAr(r.id)} onView={() => setDetailPanel({ type: "ar", id: r.id })} onEdit={() => setArModal({ mode: "edit", id: r.id, data: { ...r, job_id: String(r.job_id || ""), invoice_amt: String(r.invoice_amt ?? ""), exchange_rate: String(r.exchange_rate_locked || ""), base_amount: String(r.base_amount_locked || r.base_amount || "") } })}
                  extra={r.payment_status !== "Paid" && can("ar", "edit") ? <button type="button" onClick={(e) => { e.stopPropagation(); markArPaid(r.id); }} className="px-2 py-1 text-xs rounded bg-green-100 text-green-800 hover:bg-green-200">{t("markPaid")}</button> : null}
                />
              </td>
            </tr>
            );
          });
        }

        function renderApRows(list) {
          return list.map((r) => (
            <tr key={r.id} className={"hover:bg-blue-50/50 cursor-pointer " + (isApPaid(r) ? "bg-green-50/70 " : "") + rowHighlightClass(r.id)} onClick={() => setDetailPanel({ type: "ap", id: r.id })}>
              <td className="p-3">{r.job_no || "-"}</td>
              <td className="p-3"><span className="text-xs px-1.5 py-0.5 rounded bg-slate-100">{r.payee_type === "SI" ? t("payeeSi") : t("payeeVendor")}</span></td>
              <td className="p-3">{r.company_name}</td><td className="p-3">{r.invoice_no}</td><td className="p-3">{r.invoice_date || "-"}</td><td className="p-3">{r.invoice_received_date || "-"}</td>
              <td className="p-3">{r.due_date || "-"}</td><td className="p-3">{r.currency}</td><td className="p-3 text-right">{money(r.amount)}</td>
              <td className="p-3 text-right font-medium">{money(convertCurrency(r.amount, r.currency, "SGD"))}</td>
              <td className="p-3"><span className={"px-2 py-0.5 rounded text-xs " + apPaymentClass(r)}>{apPaymentLabel(r, t)}</span></td>
              <td className="p-3">{r.pay_date || "-"}</td><td className="p-3">{r.remarks || "-"}</td><td className="p-3">{r.bank || "-"}</td><td className="p-3">{r.charge || "-"}</td><td className="p-3">{r.swift_code || "-"}</td><td className="p-3">{r.payment_advice_email || "-"}</td>
              <td className="p-3">
                <ActionButtons viewLabel={t("view")} editLabel={t("edit")} deleteLabel={t("delete")} canEdit={can("ap", "edit")} canDelete={can("ap", "delete")} onDelete={() => deleteAp(r.id)} onView={() => setDetailPanel({ type: "ap", id: r.id })} onEdit={() => setApModal({ mode: "edit", id: r.id, data: { ...r, job_id: String(r.job_id || ""), si_id: String(r.si_id || ""), payee_type: r.payee_type || "Vendor", amount: String(r.amount ?? ""), exchange_rate: String(r.exchange_rate_locked || ""), base_amount: String(r.base_amount_locked || r.base_amount || "") } })}
                  extra={!isApPaid(r) && can("ap", "edit") ? <button type="button" onClick={(e) => { e.stopPropagation(); markApPaid(r.id); }} className="px-2 py-1 text-xs rounded bg-green-100 text-green-800 hover:bg-green-200">{t("markApPaid")}</button> : null}
                />
              </td>
            </tr>
          ));
        }

        return (
          <div className="flex min-h-screen">
            <aside className={(sidebarCollapsed ? "w-12" : "w-48") + " shrink-0 bg-slate-900 text-slate-100 p-3 transition-all duration-200 relative"}>
              <div className={"flex items-center mb-4 " + (sidebarCollapsed ? "justify-center" : "justify-between px-1")}>
                {!sidebarCollapsed && <h1 className="text-sm font-semibold tracking-wide">{t("appTitle")}</h1>}
                <button type="button" onClick={() => setSidebarCollapsed((v) => !v)} className="text-slate-300 hover:text-white text-xs px-1.5 py-1 rounded hover:bg-slate-800" title={sidebarCollapsed ? "Expand" : "Collapse"}>
                  {sidebarCollapsed ? "»" : "«"}
                </button>
              </div>
              <nav className="space-y-1">
                <SidebarItem id="dashboard" label={t("nav_dashboard")} module="dashboard" collapsed={sidebarCollapsed} />
                <SidebarItem id="clients" label={t("nav_clients")} module="clients" collapsed={sidebarCollapsed} />
                <SidebarItem id="job" label={t("nav_job")} module="job" collapsed={sidebarCollapsed} />
                <SidebarItem id="ar" label={t("nav_ar")} module="ar" collapsed={sidebarCollapsed} />
                <SidebarItem id="ap" label={t("nav_ap")} module="ap" collapsed={sidebarCollapsed} />
                <SidebarItem id="vendors" label={t("nav_vendors")} module="vendors" collapsed={sidebarCollapsed} />
                <SidebarItem id="si" label={t("nav_si")} module="si" collapsed={sidebarCollapsed} />
                <SidebarItem id="settings" label={t("nav_settings")} module="settings" collapsed={sidebarCollapsed} />
              </nav>
            </aside>

            <main className="flex-1 min-w-0 p-5 space-y-5">
              <header className="flex justify-between items-center gap-3">
                <div className="min-w-0">
                  <h2 className="text-2xl font-bold">
                    {page === "dashboard" && t("nav_dashboard")}
                    {page === "clients" && t("nav_clients")}
                    {page === "job" && t("nav_job")}
                    {page === "ar" && t("nav_ar")}
                    {page === "vendors" && t("nav_vendors")}
                    {page === "si" && t("nav_si")}
                    {page === "ap" && t("nav_ap")}
                    {page === "settings" && t("nav_settings")}
                  </h2>
                  <p className="text-sm text-slate-500">{t("baseCurrency")}: {activeBaseCurrency} · {t("region")}: {regionLabel(activeRegion, lang)} · {t("hintClickRow")}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0 flex-nowrap">
                  <div className="flex items-center gap-2 h-9 px-2.5 rounded-lg border border-slate-200 bg-white" title={t("worldTimeHint")}>
                    <span className="text-[10px] uppercase tracking-wide text-slate-400 whitespace-nowrap">{t("worldTime")}</span>
                    <span className="text-xs font-semibold text-slate-600 whitespace-nowrap">{timezoneLabel(worldTimeZone, lang)}</span>
                    <span className="text-slate-300">|</span>
                    <span className="text-xs font-mono font-semibold text-slate-700 tabular-nums whitespace-nowrap">{formatWorldTime(worldClock, worldTimeZone, lang)}</span>
                  </div>
                  <div className="flex items-center gap-1.5 h-9">
                    <span className="text-[10px] text-slate-400 whitespace-nowrap">{t("currentUser")}</span>
                    <select value={currentUserId} onChange={(e) => setCurrentUserId(Number(e.target.value))} className="h-9 min-w-[7rem] rounded-lg border border-slate-300 bg-white text-xs px-2" title={t("switchUser")}>
                      {users.filter((u) => u.is_active).map((u) => <option key={u.id} value={u.id}>{u.name}</option>)}
                    </select>
                  </div>
                  <div className="flex items-center gap-1.5 h-9">
                    <span className="text-[10px] text-slate-400 whitespace-nowrap">{t("region")}</span>
                    <select value={activeRegion} onChange={(e) => setActiveRegion(e.target.value)} className="h-9 min-w-[4.5rem] rounded-lg border border-slate-300 bg-white text-xs px-2 font-semibold">
                      {getUserRegions().map((rid) => <option key={rid} value={rid}>{regionLabel(rid, lang)}</option>)}
                    </select>
                  </div>
                  <select value={baseCurrency} onChange={(e) => setBaseCurrency(e.target.value)} className="h-9 w-[4.5rem] shrink-0 rounded-lg border border-slate-300 bg-white text-xs px-2">
                    <option value="HKD">HKD</option><option value="USD">USD</option><option value="RMB">RMB</option>
                    <option value="TWD">TWD</option><option value="SGD">SGD</option><option value="EUR">EUR</option><option value="OTHER">Other</option>
                  </select>
                  {baseCurrency === "OTHER" && <Input placeholder="e.g. MYD" className="w-16 h-9 text-xs px-2 bg-white shrink-0" value={customCurrency} onChange={(e) => setCustomCurrency(e.target.value)} />}
                  {(can("ar", "add") || can("ap", "add")) && <button type="button" onClick={() => setNewTxOpen(true)} className="h-9 shrink-0 px-3 text-xs rounded-lg bg-blue-600 text-white hover:bg-blue-700 whitespace-nowrap">{t("newTransaction")}</button>}
                </div>
              </header>

              {page === "dashboard" && (
                <>
                  <section className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <article className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm"><p className="text-xs text-slate-500">{t("arOutstanding")} ({activeBaseCurrency})</p><p className="text-2xl font-bold mt-2">{money(arTotal)}</p><p className="text-xs text-slate-500 mt-2">{overdueCount} {t("overdueCount")}</p></article>
                    <article className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm"><p className="text-xs text-slate-500">{t("apOutstanding")} ({activeBaseCurrency})</p><p className="text-2xl font-bold mt-2">{money(apTotal)}</p><p className="text-xs text-slate-500 mt-2">{scopedApBills.length} {t("pendingBills")}</p></article>
                    <article className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm"><p className="text-xs text-slate-500">{t("netPosition")}</p><p className="text-2xl font-bold mt-2">{money(arTotal - apTotal)}</p></article>
                    <article className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm"><p className="text-xs text-slate-500">{t("dueSoon")}</p><p className="text-2xl font-bold mt-2">{dueSoonCount}</p><p className="text-xs text-slate-500 mt-2">{t("dueSoonHint")}</p></article>
                  </section>
                  <section className="grid grid-cols-1 xl:grid-cols-3 gap-4">
                    <article className="xl:col-span-2 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                      <h3 className="font-semibold mb-4">{t("cashFlow")} - {activeBaseCurrency}</h3>
                      <div className="h-72 rounded-lg bg-slate-50 border border-slate-200 p-4 overflow-x-auto">
                        <div className="min-w-[860px] h-full flex items-end gap-4">
                          {cashFlowSeries.map((p) => (
                            <div key={p.date} className="flex flex-col items-center gap-1">
                              <div className="flex items-end gap-1 h-56">
                                <div title={`${p.date} Cash In: ${money(p.inBase)} ${activeBaseCurrency}`} className="w-4 bg-blue-500 rounded-t cursor-pointer" style={{ height: `${(p.inBase / maxBar) * 100}%` }}></div>
                                <div title={`${p.date} Cash Out: ${money(p.outBase)} ${activeBaseCurrency}`} className="w-4 bg-rose-400 rounded-t cursor-pointer" style={{ height: `${(p.outBase / maxBar) * 100}%` }}></div>
                              </div>
                              <span className="text-[10px] text-slate-500">{p.date}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </article>
                    <article className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                      <h3 className="font-semibold mb-4">{t("arAging")} ({activeBaseCurrency})</h3>
                      <ul className="space-y-3 text-sm">
                        <li className="flex justify-between"><span>0 - 30 days</span><span className="font-semibold">{money(aging.d0_30)}</span></li>
                        <li className="flex justify-between"><span>31 - 60 days</span><span className="font-semibold">{money(aging.d31_60)}</span></li>
                        <li className="flex justify-between"><span>61 - 90 days</span><span className="font-semibold">{money(aging.d61_90)}</span></li>
                        <li className="flex justify-between text-red-600"><span>90+ days</span><span className="font-semibold">{money(aging.d90_plus)}</span></li>
                      </ul>
                    </article>
                  </section>
                  <section className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                    <article className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                      <div className="p-4 border-b"><h3 className="font-semibold">{t("topOverdue")}</h3></div>
                      <table className="w-full text-sm">
                        <thead className="bg-slate-50 text-slate-500"><tr><th className="text-left p-3">Invoice</th><th className="text-left p-3">Client</th><th className="text-left p-3">Overdue</th><th className="text-right p-3">Amount</th></tr></thead>
                        <tbody className="divide-y">{overdueList.map((r) => <tr key={r.id} className="hover:bg-slate-50 cursor-pointer" onClick={() => setDetailPanel({ type: "ar", id: r.id })}><td className="p-3 font-medium text-blue-600">{r.invoice_no}</td><td className="p-3">{r.customer}</td><td className="p-3 text-red-600">+{r.overdue_days} days</td><td className="p-3 text-right font-semibold">{money(r.display_base_amount)}</td></tr>)}</tbody>
                      </table>
                    </article>
                    <article className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                      <div className="p-4 border-b"><h3 className="font-semibold">{t("approvalQueue")}</h3></div>
                      <ul className="divide-y text-sm">{approvals.map((a) => <li key={a.id} className="p-4 flex justify-between"><div><p className="font-medium">{a.doc}</p><p className="text-xs text-slate-500">Requester: {a.requester}</p></div><span className={a.status === "Over SLA" ? "text-red-600" : "text-amber-600"}>{a.status}</span></li>)}</ul>
                    </article>
                  </section>
                </>
              )}

              {page === "clients" && (
                <section className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                  <div className="p-4 border-b flex justify-between items-center gap-2 flex-wrap">
                    <h3 className="font-semibold">{t("nav_clients")}</h3>
                    <div className="flex items-center gap-2 flex-wrap">
                      <ListImportExportBar module="clients" />
                      {can("clients", "add") && <button onClick={() => setClientModal({ mode: "add", data: emptyClient() })} className="px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">{t("addClient")}</button>}
                    </div>
                  </div>
                  <div className="overflow-auto">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-50 text-slate-500">
                        <tr>
                          <th className="p-3 text-left">Customer No.</th><th className="p-3 text-left">COMPANY</th><th className="p-3 text-left">GST#</th>
                          <th className="p-3 text-left">Primary Contact</th><th className="p-3 text-left">Company Phone #</th><th className="p-3 text-left">Mobile Phone #</th>
                          <th className="p-3 text-left">E-mail</th><th className="p-3 text-left">Address</th><th className="p-3 text-left">Postal Code</th>
                          <th className="p-3 text-left">Account Dept Contact</th><th className="p-3 text-left">Payment Terms</th><th className="p-3 text-left">{t("actions")}</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y">
                        {scopedClients.map((c) => (
                          <tr key={c.id} className="hover:bg-blue-50/50 cursor-pointer" onClick={() => setDetailPanel({ type: "client", id: c.id })}>
                            <td className="p-3">{c.customer_no}</td><td className="p-3 font-medium">{c.company}</td><td className="p-3">{c.gst_no}</td>
                            <td className="p-3">{c.primary_contact}</td><td className="p-3">{c.company_phone}</td><td className="p-3">{c.mobile_phone}</td>
                            <td className="p-3">{c.email}</td><td className="p-3">{c.address}</td><td className="p-3">{c.postal_code}</td>
                            <td className="p-3">{c.account_dept_contact}</td><td className="p-3">{c.payment_terms}</td>
                            <td className="p-3"><ActionButtons viewLabel={t("view")} editLabel={t("edit")} deleteLabel={t("delete")} canEdit={can("clients", "edit")} canDelete={can("clients", "delete")} onDelete={() => deleteClient(c.id)} onView={() => setDetailPanel({ type: "client", id: c.id })} onEdit={() => setClientModal({ mode: "edit", id: c.id, data: { ...c } })} /></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </section>
              )}

              {page === "job" && (
                <section className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                  <div className="p-4 border-b">
                    <div className="flex justify-between items-center gap-2 flex-wrap">
                      <h3 className="font-semibold">{t("nav_job")}</h3>
                      <div className="flex items-center gap-2 flex-wrap">
                        <ListImportExportBar module="job" />
                        {can("job", "add") && <button onClick={() => setJobModal({ mode: "add", data: emptyJob() })} className="px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">{t("addJob")}</button>}
                      </div>
                    </div>
                    <p className="text-xs text-slate-500 mt-2">{t("jobFlowHint")}</p>
                  </div>
                  <ListToolbar t={t} mode="job" clients={scopedClients} jobs={scopedJobs} viewMode={jobViewMode} setViewMode={setJobViewMode} clientFilter={jobClientFilter} setClientFilter={setJobClientFilter} statusFilter={jobStatusFilter} setStatusFilter={setJobStatusFilter} lang={lang} />
                  <div className="overflow-auto">
                    {jobViewMode === "grouped" ? (
                      groupRows(filteredJobs, (j) => j.company).map(([group, rows]) => (
                        <div key={group} className="mb-4">
                          <div className="px-4 py-2 bg-blue-50 border-y font-semibold text-blue-900">{group}</div>
                          <table className="w-full text-sm">
                            <thead className="bg-slate-50 text-slate-500">
                              <tr>
                                <th className="p-3 text-left">Job No.</th><th className="p-3 text-left">{t("clientGroup")}</th><th className="p-3 text-left">{t("type")}</th>
                                <th className="p-3 text-left">Customer PO</th><th className="p-3 text-left">{t("status")}</th><th className="p-3 text-left">Start Date</th>
                                <th className="p-3 text-left">{t("invoices")}</th><th className="p-3 text-left">{t("apBills")}</th><th className="p-3 text-left">{t("actions")}</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y">{renderJobRows(rows)}</tbody>
                          </table>
                        </div>
                      ))
                    ) : (
                      <table className="w-full text-sm">
                        <thead className="bg-slate-50 text-slate-500">
                          <tr>
                            <th className="p-3 text-left">Job No.</th><th className="p-3 text-left">{t("clientGroup")}</th><th className="p-3 text-left">{t("type")}</th>
                            <th className="p-3 text-left">Customer PO</th><th className="p-3 text-left">{t("status")}</th><th className="p-3 text-left">Start Date</th>
                            <th className="p-3 text-left">{t("invoices")}</th><th className="p-3 text-left">{t("apBills")}</th><th className="p-3 text-left">{t("actions")}</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y">{renderJobRows(filteredJobs)}</tbody>
                      </table>
                    )}
                  </div>
                </section>
              )}

              {page === "vendors" && (

                    )}
                    <div className="flex justify-end gap-2">
                      <button type="button" onClick={() => setUserModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button>
                      <button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button>
                    </div>
                  </form>
                </Modal>
              )}

              {importPreview && (
                <Modal title={t("importPreviewTitle") + " — " + moduleLabel(importPreview.module, t)} onClose={() => setImportPreview(null)} wide>
                  <p className="text-sm text-slate-500 mb-3">{t("importModeHint")} · {importPreview.fileName}</p>
                  <div className="overflow-auto border rounded-lg max-h-80 mb-4">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-50 text-slate-500 sticky top-0">
                        <tr>
                          <th className="p-2 text-left">#</th>
                          <th className="p-2 text-left">{t("auditAction")}</th>
                          <th className="p-2 text-left">Key</th>
                          <th className="p-2 text-left">{t("auditDetail")}</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y">
                        {importPreview.preview.map((p) => (
                          <tr key={p.lineNo} className={p.action === "error" ? "bg-red-50" : p.action === "create" ? "bg-green-50" : "bg-amber-50"}>
                            <td className="p-2">{p.lineNo}</td>
                            <td className="p-2">{p.action === "error" ? t("importRowError") : p.action === "create" ? t("importRowCreate") : t("importRowUpdate")}</td>
                            <td className="p-2 font-mono text-xs">{p.key || "-"}</td>
                            <td className="p-2 text-xs">{p.errors.length ? p.errors.join("; ") : (p.data.company || p.data.job_no || "")}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div className="flex justify-between items-center gap-2 flex-wrap">
                    <p className="text-sm text-slate-600">
                      {t("importSummary")}: {importPreview.preview.filter((p) => p.action === "create").length} {t("importRowCreate")},{" "}
                      {importPreview.preview.filter((p) => p.action === "update").length} {t("importRowUpdate")},{" "}
                      {importPreview.preview.filter((p) => p.action === "error").length} {t("importRowError")}
                    </p>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setImportPreview(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button>
                      <button type="button" onClick={applyImportPreview} disabled={!importPreview.preview.some((p) => p.action !== "error")} className="px-4 py-2 rounded-lg bg-emerald-600 text-white disabled:opacity-40">{t("importConfirm")}</button>
                    </div>
                  </div>
                </Modal>
              )}

              {newTxOpen && (
                <Modal title={t("newTxTitle")} onClose={() => setNewTxOpen(false)}>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {can("ar", "add") && <button onClick={() => { setArModal({ mode: "add", data: { job_id: "", job_no: "", customer: "", customer_po: "", job_completed: false, invoice_no: "", invoice_currency: "USD", invoice_amt: "", exchange_rate: "", base_amount: "", override_reason: "", invoice_date: "", due_date: "", payment_received_date: "", payment_status: "Awaiting Payment" } }); setNewTxOpen(false); }} className="rounded-lg border p-4 text-left hover:bg-slate-50">
                      <p className="font-semibold">{t("createArTitle")}</p><p className="text-xs text-slate-500">{t("createArDesc")}</p>
                    </button>}
                    {can("ap", "add") && <button onClick={() => { setApModal({ mode: "add", data: emptyApForm() }); setNewTxOpen(false); }} className="rounded-lg border p-4 text-left hover:bg-slate-50">
                      <p className="font-semibold">{t("createApTitle")}</p><p className="text-xs text-slate-500">{t("createApDesc")}</p>
                    </button>}
                  </div>
                </Modal>
              )}

              {clientModal && (
                <Modal title={clientModal.mode === "add" ? t("addClientTitle") : t("editClient")} onClose={() => setClientModal(null)}>
                  <form onSubmit={saveClient} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="Customer No."><Input required value={clientModal.data.customer_no} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, customer_no: e.target.value } })} /></Field>
                    <Field label="COMPANY"><Input required value={clientModal.data.company} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, company: e.target.value } })} /></Field>
                    <Field label="GST#"><Input value={clientModal.data.gst_no} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, gst_no: e.target.value } })} /></Field>
                    <Field label="Primary Contact"><Input value={clientModal.data.primary_contact} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, primary_contact: e.target.value } })} /></Field>
                    <Field label="Company Phone #"><Input value={clientModal.data.company_phone} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, company_phone: e.target.value } })} /></Field>
                    <Field label="Mobile Phone #"><Input value={clientModal.data.mobile_phone} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, mobile_phone: e.target.value } })} /></Field>
                    <Field label="E-mail"><Input type="email" value={clientModal.data.email} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, email: e.target.value } })} /></Field>
                    <Field label="Address"><Input value={clientModal.data.address} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, address: e.target.value } })} /></Field>
                    <Field label="Postal Code"><Input value={clientModal.data.postal_code} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, postal_code: e.target.value } })} /></Field>
                    <Field label="Contact Person in Account Dept."><Input value={clientModal.data.account_dept_contact} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, account_dept_contact: e.target.value } })} /></Field>
                    <Field label="Payment Terms"><Input value={clientModal.data.payment_terms} onChange={(e) => setClientModal({ ...clientModal, data: { ...clientModal.data, payment_terms: e.target.value } })} /></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setClientModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {jobModal && (
                <Modal title={jobModal.mode === "add" ? t("addJobTitle") : t("editJob")} onClose={() => setJobModal(null)}>
                  <form onSubmit={saveJob} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="Job No."><Input required value={jobModal.data.job_no} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, job_no: e.target.value } })} /></Field>
                    <Field label={t("clientGroup")}>
                      <Select required value={jobModal.data.client_id} onChange={(e) => {
                        const client = clients.find((c) => c.id === Number(e.target.value));
                        setJobModal({ ...jobModal, data: { ...jobModal.data, client_id: e.target.value, company: client ? client.company : "" } });
                      }}>
                        <option value="">Select Client</option>
                        {clients.filter((c) => c.region === (jobModal.mode === "edit" ? (jobs.find((j) => j.id === jobModal.id)?.region || regionForNewRecord()) : regionForNewRecord())).map((c) => <option key={c.id} value={c.id}>{c.customer_no} · {c.company}</option>)}
                      </Select>
                    </Field>
                    <Field label="Type">
                      <Select required value={jobModal.data.job_type} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, job_type: e.target.value } })}>
                        {JOB_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                      </Select>
                    </Field>
                    <Field label="Customer PO"><Input value={jobModal.data.customer_po} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, customer_po: e.target.value } })} /></Field>
                    <Field label="Status">
                      <Select value={jobModal.data.status} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, status: e.target.value } })}>
                        <option>Open</option><option>In Progress</option><option>Completed</option><option>On Hold</option>
                      </Select>
                    </Field>
                    <Field label="Start Date"><Input type="date" value={jobModal.data.start_date} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, start_date: e.target.value } })} /></Field>
                    <Field label="Description"><Input value={jobModal.data.description} onChange={(e) => setJobModal({ ...jobModal, data: { ...jobModal.data, description: e.target.value } })} /></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setJobModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {vendorModal && (
                <Modal title={vendorModal.mode === "add" ? t("addVendorTitle") : t("editVendor")} onClose={() => setVendorModal(null)}>
                  <form onSubmit={saveVendor} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="Vendor Name"><Input required value={vendorModal.data.name} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, name: e.target.value } })} /></Field>
                    <Field label="Email"><Input type="email" value={vendorModal.data.email} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, email: e.target.value } })} /></Field>
                    <Field label="Bank"><Input value={vendorModal.data.bank} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, bank: e.target.value } })} /></Field>
                    <Field label="SWIFT CODE"><Input value={vendorModal.data.swift_code} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, swift_code: e.target.value } })} /></Field>
                    <Field label="Contact"><Input value={vendorModal.data.contact} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, contact: e.target.value } })} /></Field>
                    <Field label="Phone"><Input value={vendorModal.data.phone} onChange={(e) => setVendorModal({ ...vendorModal, data: { ...vendorModal.data, phone: e.target.value } })} /></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setVendorModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {siModal && (
                <Modal title={siModal.mode === "add" ? t("addSiTitle") : t("editSi")} onClose={() => setSiModal(null)}>
                  <form onSubmit={saveSi} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="SI Name"><Input required value={siModal.data.name} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, name: e.target.value } })} /></Field>
                    <Field label="Email"><Input type="email" value={siModal.data.email} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, email: e.target.value } })} /></Field>
                    <Field label="Bank"><Input value={siModal.data.bank} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, bank: e.target.value } })} /></Field>
                    <Field label="SWIFT CODE"><Input value={siModal.data.swift_code} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, swift_code: e.target.value } })} /></Field>
                    <Field label="Contact"><Input value={siModal.data.contact} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, contact: e.target.value } })} /></Field>
                    <Field label="Phone"><Input value={siModal.data.phone} onChange={(e) => setSiModal({ ...siModal, data: { ...siModal.data, phone: e.target.value } })} /></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setSiModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {arModal && (
                <Modal title={arModal.mode === "add" ? t("createArTitle") : t("editAr")} onClose={() => setArModal(null)} wide>
                  <form onSubmit={saveAR} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="Link Job">
                      <Select value={arModal.data.job_id} onChange={(e) => {
                        const job = jobs.find((j) => j.id === Number(e.target.value));
                        setArModal({ ...arModal, data: { ...arModal.data, job_id: e.target.value, job_no: job ? job.job_no : "", customer: job ? job.company : arModal.data.customer, customer_po: job ? job.customer_po : arModal.data.customer_po } });
                      }}>
                        <option value="">Select Job (optional)</option>
                        {scopedJobs.map((j) => <option key={j.id} value={j.id}>{j.job_no} · {j.company} · {j.job_type}</option>)}
                      </Select>
                    </Field>
                    <Field label="Customer"><Input value={arModal.data.customer} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, customer: e.target.value } })} /></Field>
                    <Field label="Customer PO"><Input value={arModal.data.customer_po} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, customer_po: e.target.value } })} /></Field>
                    {(() => {
                      const linked = jobs.find((j) => j.id === Number(arModal.data.job_id));
                      return linked ? <Field label={t("jobStatus")}><Input readOnly value={linked.status} className="bg-slate-50" /></Field> : null;
                    })()}
                    <Field label="Invoice No."><Input required value={arModal.data.invoice_no} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, invoice_no: e.target.value } })} /></Field>
                    <Field label="Invoice Currency"><Input required value={arModal.data.invoice_currency} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, invoice_currency: e.target.value.toUpperCase() } })} /></Field>
                    <Field label={t("invoiceAmountOrig")}>
                      <Input type="number" step="0.01" required value={arModal.data.invoice_amt} onChange={(e) => calcBaseEditable({ invoice_amt: e.target.value }, arModal.data, (d) => setArModal((prev) => ({ ...prev, data: d })))} />
                      <p className="text-[10px] text-slate-400 mt-1">{t("invoiceAmountHint")}</p>
                    </Field>
                    <Field label="Exchange Rate"><Input type="number" step="0.0001" required value={arModal.data.exchange_rate} onChange={(e) => calcBaseEditable({ exchange_rate: e.target.value }, arModal.data, (d) => setArModal((prev) => ({ ...prev, data: d })))} /></Field>
                    <Field label={`Amount in ${activeBaseCurrency} (${t("amountManualOverride")})`}>
                      <Input type="number" step="0.01" value={arModal.data.base_amount} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, base_amount: e.target.value } })} />
                      <p className="text-[10px] text-slate-400 mt-1">{t("baseAmountHint")}</p>
                    </Field>
                    <Field label="Invoice Date"><Input type="date" required value={arModal.data.invoice_date} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, invoice_date: e.target.value } })} /></Field>
                    <Field label="Due Date"><Input type="date" required value={arModal.data.due_date} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, due_date: e.target.value } })} /></Field>
                    <Field label={t("paymentReceived")}><Input type="date" value={arModal.data.payment_received_date} onChange={(e) => {
                      const v = e.target.value;
                      setArModal({ ...arModal, data: { ...arModal.data, payment_received_date: v, payment_status: v ? "Paid" : arModal.data.payment_status } });
                    }} /></Field>
                    <p className="md:col-span-2 text-xs text-slate-500">{t("autoPaidHint")}</p>
                    <Field label={t("paymentStatus")}><Select value={arModal.data.payment_status} onChange={(e) => setArModal({ ...arModal, data: { ...arModal.data, payment_status: e.target.value } })}><option value="Awaiting Payment">{t("awaitingPayment")}</option><option value="Overdue">{t("overdue")}</option><option value="Paid">{t("paid")}</option></Select></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setArModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {apModal && (
                <Modal title={apModal.mode === "add" ? t("createApTitle") : t("editAp")} onClose={() => setApModal(null)} wide>
                  <form onSubmit={saveAP} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <Field label="Link Job">
                      <Select value={apModal.data.job_id} onChange={(e) => {
                        const job = jobs.find((j) => j.id === Number(e.target.value));
                        setApModal({ ...apModal, data: { ...apModal.data, job_id: e.target.value, job_no: job ? job.job_no : "" } });
                      }}>
                        <option value="">Select Job</option>
                        {scopedJobs.map((j) => <option key={j.id} value={j.id}>{j.job_no} · {j.company}</option>)}
                      </Select>
                    </Field>
                    <Field label={t("payeeType")}>
                      <Select value={apModal.data.payee_type} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, payee_type: e.target.value, company_name: "", si_id: "" } })}>
                        <option value="Vendor">{t("payeeVendor")}</option>
                        <option value="SI">{t("payeeSi")}</option>
                      </Select>
                    </Field>
                    <Field label="Company Name">
                      {apModal.data.payee_type === "SI" ? (
                        <Select required value={apModal.data.si_id} onChange={(e) => {
                          const si = sis.find((s) => s.id === Number(e.target.value));
                          setApModal({ ...apModal, data: { ...apModal.data, si_id: e.target.value, company_name: si ? si.name : "", bank: si ? si.bank : apModal.data.bank, swift_code: si ? si.swift_code : apModal.data.swift_code, payment_advice_email: si ? si.email : apModal.data.payment_advice_email } });
                        }}>
                          <option value="">Select SI</option>
                          {scopedSis.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </Select>
                      ) : (
                        <Select required value={apModal.data.company_name} onChange={(e) => {
                          const v = vendors.find((x) => x.name === e.target.value);
                          setApModal({ ...apModal, data: { ...apModal.data, company_name: e.target.value, bank: v ? v.bank : apModal.data.bank, swift_code: v ? v.swift_code : apModal.data.swift_code, payment_advice_email: v ? v.email : apModal.data.payment_advice_email } });
                        }}>
                          <option value="">Select Vendor</option>
                          {scopedVendors.map((v) => <option key={v.id} value={v.name}>{v.name}</option>)}
                        </Select>
                      )}
                    </Field>
                    <Field label="Invoice No."><Input required value={apModal.data.invoice_no} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, invoice_no: e.target.value } })} /></Field>
                    <Field label="Invoice Date"><Input type="date" required value={apModal.data.invoice_date} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, invoice_date: e.target.value } })} /></Field>
                    <Field label="Invoice Received Date"><Input type="date" value={apModal.data.invoice_received_date} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, invoice_received_date: e.target.value } })} /></Field>
                    <Field label="Due Date"><Input type="date" required value={apModal.data.due_date} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, due_date: e.target.value } })} /></Field>
                    <Field label="Currency"><Input required value={apModal.data.currency} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, currency: e.target.value.toUpperCase() } })} /></Field>
                    <Field label={t("invoiceAmountOrig")}>
                      <Input type="number" step="0.01" required value={apModal.data.amount} onChange={(e) => calcBaseEditable({ amount: e.target.value }, apModal.data, (d) => setApModal((prev) => ({ ...prev, data: d })))} />
                      <p className="text-[10px] text-slate-400 mt-1">{t("invoiceAmountHint")}</p>
                    </Field>
                    <Field label="Exchange Rate"><Input type="number" step="0.0001" required value={apModal.data.exchange_rate} onChange={(e) => calcBaseEditable({ exchange_rate: e.target.value }, apModal.data, (d) => setApModal((prev) => ({ ...prev, data: d })))} /></Field>
                    <Field label={`Amount in ${activeBaseCurrency} (${t("amountManualOverride")})`}>
                      <Input type="number" step="0.01" value={apModal.data.base_amount} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, base_amount: e.target.value } })} />
                      <p className="text-[10px] text-slate-400 mt-1">{t("baseAmountHint")}</p>
                    </Field>
                    <Field label="Pay Date"><Input type="date" value={apModal.data.pay_date} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, pay_date: e.target.value } })} /></Field>
                    <p className="md:col-span-2 text-xs text-slate-500">{t("autoApPaidHint")}</p>
                    <Field label="Remarks"><Input value={apModal.data.remarks} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, remarks: e.target.value } })} /></Field>
                    <Field label="Bank"><Input value={apModal.data.bank} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, bank: e.target.value } })} /></Field>
                    <Field label="Charge"><Input value={apModal.data.charge} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, charge: e.target.value } })} /></Field>
                    <Field label="SWIFT CODE"><Input value={apModal.data.swift_code} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, swift_code: e.target.value } })} /></Field>
                    <Field label="Payment Advice Email"><Input type="email" value={apModal.data.payment_advice_email} onChange={(e) => setApModal({ ...apModal, data: { ...apModal.data, payment_advice_email: e.target.value } })} /></Field>
                    <div className="md:col-span-2 flex justify-end gap-2"><button type="button" onClick={() => setApModal(null)} className="px-4 py-2 rounded-lg border">{t("cancel")}</button><button className="px-4 py-2 rounded-lg bg-blue-600 text-white">{t("save")}</button></div>
                  </form>
                </Modal>
              )}

              {renderDetailPanel()}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
</body>
</html>
